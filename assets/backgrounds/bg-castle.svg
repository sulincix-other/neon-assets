      <stop offset="0%" stop-color="#0a000a"/><stop offset="30%" stop-color="#1a001a"/><stop offset="100%" stop-color="#2a0020"/>
    </linearGradient>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="glowBig" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000"><feGaussianBlur stdDeviation="6"/></filter>
