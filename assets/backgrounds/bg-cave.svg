  <g filter="url(#glow)" opacity="0.6">
    <circle cx="160" cy="140" r="6" fill="#ffff00"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="160" r="4" fill="#ff6600"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="150" r="3" fill="#ff0066"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.8s" repeatCount="indefinite"/></circle>
