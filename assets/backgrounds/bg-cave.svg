    <circle cx="100" cy="50" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="25" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="60" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="90" r="0.6" fill="#ffffff"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="70" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="85" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="2s" repeatCount="indefinite"/></circle>
