<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 320 240" width="640" height="480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/><stop offset="60%" stop-color="#100520"/><stop offset="100%" stop-color="#1a0530"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="glowBig" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="320" height="240" fill="url(#sky)"/>
  <g filter="url(#glowBig)" opacity="0.4">
    <circle cx="100" cy="160" r="50" fill="#ff6600">
      <animate attributeName="r" values="50;58;50" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.2;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="140" r="45" fill="#ff0066">
