<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 320 240" width="640" height="480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0020"/><stop offset="40%" stop-color="#1a0040"/><stop offset="100%" stop-color="#0d0015"/>
    </linearGradient>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glowBig" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="320" height="240" fill="url(#sky)"/>
  <g filter="url(#glowBig)" opacity="0.35">
    <circle cx="60" cy="150" r="40" fill="#ff00ff">
      <animate attributeName="r" values="40;48;40" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.2;0.35" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="130" r="50" fill="#0066ff">
      <animate attributeName="r" values="50;58;50" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="160" r="30" fill="#ffff00">
      <animate attributeName="r" values="30;38;30" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect x="0" y="200" width="320" height="40" fill="#0a001a"/>
  <g stroke="#ff00ff" stroke-width="1.5" opacity="0.5" fill="none">
    <rect x="10" y="140" width="30" height="70"/><rect x="50" y="120" width="25" height="90"/>
    <rect x="85" y="130" width="35" height="80"/><rect x="130" y="110" width="20" height="100"/>
    <rect x="160" y="140" width="30" height="70"/><rect x="200" y="100" width="28" height="110"/>
    <rect x="240" y="125" width="25" height="85"/><rect x="275" y="135" width="35" height="75"/>
  </g>
  <g fill="#ff00ff" opacity="0.12" filter="url(#glow)">
    <rect x="10" y="140" width="30" height="70"/><rect x="50" y="120" width="25" height="90"/>
    <rect x="85" y="130" width="35" height="80"/><rect x="130" y="110" width="20" height="100"/>
    <rect x="160" y="140" width="30" height="70"/><rect x="200" y="100" width="28" height="110"/>
    <rect x="240" y="125" width="25" height="85"/><rect x="275" y="135" width="35" height="75"/>
  </g>
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="40" cy="160" r="4" fill="#ffff00"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="140" r="3" fill="#00ffff"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="130" r="3.5" fill="#ffff00"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="160" r="2" fill="#00ffff"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>
  <g opacity="0.7">
    <circle cx="30" cy="30" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="20" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="40" r="1.8" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="15" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="50" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="35" r="0.6" fill="#ffffff"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3s" repeatCount="indefinite"/></circle>
  </g>
  <line x1="0" y1="240" x2="320" y2="240" stroke="#ff00ff" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
  </line>
</svg>
