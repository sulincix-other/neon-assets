      <stop offset="0%" stop-color="#1a0033"/><stop offset="40%" stop-color="#0d0020"/><stop offset="100%" stop-color="#020210"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glowBig" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5"/></filter>
