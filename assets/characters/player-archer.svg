<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -40 60 80" width="240" height="240">
  <defs>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="1.1s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="26" rx="14" ry="3" fill="rgba(0,0,0,0.4)"/>
    <rect x="-6" y="14" width="5" height="12" rx="2" fill="#00ff44" filter="url(#glowGreen)"/>
    <rect x="1" y="14" width="5" height="12" rx="2" fill="#00ff44" filter="url(#glowGreen)"/>
    <rect x="-8" y="1" width="16" height="14" rx="4" fill="none" stroke="#00ff44" stroke-width="2" filter="url(#glowGreen)"/>
    <rect x="-6" y="3" width="12" height="8" rx="2" fill="#00ff44" opacity="0.12"/>
    <rect x="-14" y="2" width="6" height="4" rx="2" fill="#00ff44" filter="url(#glowGreen)">
      <animate attributeName="x" values="-14;-12;-14" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="2" width="6" height="4" rx="2" fill="#00ff44" filter="url(#glowGreen)">
      <animate attributeName="x" values="8;6;8" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <circle cx="0" cy="-10" r="8" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glowYellow)"/>
    <rect x="-5" y="-13" width="10" height="4" rx="2" fill="#ffff00" opacity="0.7" filter="url(#glowYellow)">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <line x1="-2" y1="-19" x2="-2" y2="-24" stroke="#ffff00" stroke-width="1.2" filter="url(#glowYellow)"/>
    <circle cx="-2" cy="-26" r="1.5" fill="#00ff44" filter="url(#glowGreen)">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <path d="M-18,-2 Q-22,-8 -18,-14" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round" filter="url(#glowCyan)"/>
    <line x1="-18" y1="-14" x2="-10" y2="-2" fill="none" stroke="#00ffff" stroke-width="1" filter="url(#glowCyan)"/>
    <line x1="-10" y1="-2" x2="-4" y2="-2" stroke="#00ffff" stroke-width="1" filter="url(#glowCyan)"/>
    <line x1="12" y1="2" x2="18" y2="-8" stroke="#00ff44" stroke-width="1.5" filter="url(#glowGreen)"/>
    <line x1="18" y1="-8" x2="20" y2="-12" stroke="#00ffff" stroke-width="1" filter="url(#glowCyan)"/>
  </g>
</svg>
