<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-40 -40 80 80" width="240" height="240">
  <defs>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="22" rx="12" ry="3" fill="rgba(0,0,0,0.4)">
      <animate attributeName="rx" values="12;11;12" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="-6" y="10" width="5" height="12" rx="2" fill="#ff00ff" filter="url(#glowPink)"/>
    <rect x="2" y="10" width="5" height="12" rx="2" fill="#ff00ff" filter="url(#glowPink)"/>
    <rect x="-8" y="-4" width="16" height="16" rx="4" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glowPink)"/>
    <rect x="-5" y="0" width="10" height="8" rx="2" fill="#ff00ff" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-14" y="-2" width="6" height="4" rx="2" fill="#ff00ff" filter="url(#glowPink)"/>
    <rect x="8" y="-2" width="6" height="4" rx="2" fill="#ff00ff" filter="url(#glowPink)"/>
    <circle cx="0" cy="-12" r="8" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)"/>
    <rect x="-5" y="-15" width="10" height="4" rx="2" fill="#00ffff" opacity="0.8" filter="url(#glowCyan)">
      <animate attributeName="opacity" values="0.8;0.5;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <line x1="0" y1="-20" x2="0" y2="-25" stroke="#00ffff" stroke-width="1.2" filter="url(#glowCyan)"/>
    <circle cx="0" cy="-27" r="1.5" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="r" values="1.5;2;1.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="10" y1="-4" x2="15" y2="-18" stroke="#ffff00" stroke-width="1.5" filter="url(#glowYellow)"/>
    <rect x="9" y="-4" width="2.5" height="6" rx="1" fill="#ffff00" filter="url(#glowYellow)"/>
  </g>
</svg>
