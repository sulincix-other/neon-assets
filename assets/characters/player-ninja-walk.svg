<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-40 -40 80 80" width="240" height="240">
  <defs>
    <filter id="glowPink" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;2,-3;-2,-1;0,0" dur="0.8s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="22" rx="14" ry="3" fill="rgba(0,0,0,0.4)">
      <animate attributeName="rx" values="14;12;14;14" dur="0.8s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="-6" y="10" width="5" height="12" rx="2" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="x" values="-6;0;-6" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="2" y="10" width="5" height="12" rx="2" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="x" values="2;-4;2" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="-8" y="-4" width="16" height="16" rx="4" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glowPink)">
      <animate attributeName="x" values="-8;-6;-8" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-5" y="0" width="10" height="8" rx="2" fill="#ff00ff" opacity="0.2">
      <animate attributeName="x" values="-5;-3;-5" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-14" y="-2" width="6" height="4" rx="2" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="x" values="-14;-12;-14" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="-2" width="6" height="4" rx="2" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="x" values="8;10;8" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <circle cx="0" cy="-12" r="8" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)">
      <animate attributeName="cx" values="0;2;0" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <rect x="-5" y="-15" width="10" height="4" rx="2" fill="#00ffff" opacity="0.8" filter="url(#glowCyan)">
      <animate attributeName="x" values="-5;-3;-5" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <line x1="0" y1="-20" x2="0" y2="-25" stroke="#00ffff" stroke-width="1.2" filter="url(#glowCyan)">
      <animate attributeName="x1" values="0;2;0" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2;0" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="-27" r="1.5" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="cx" values="0;2;0" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <line x1="10" y1="-4" x2="15" y2="-18" stroke="#ffff00" stroke-width="1.5" filter="url(#glowYellow)">
      <animate attributeName="x1" values="10;12;10" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="15;17;15" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <rect x="9" y="-4" width="2.5" height="6" rx="1" fill="#ffff00" filter="url(#glowYellow)">
      <animate attributeName="x" values="9;11;9" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
