<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-25 -30 50 60" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.6s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="3s" repeatCount="indefinite"/>
      <line x1="0" y1="10" x2="0" y2="22" stroke="#ffff00" stroke-width="2" filter="url(#glow)"/>
      <line x1="-6" y1="16" x2="6" y2="16" stroke="#ffff00" stroke-width="2" filter="url(#glow)"/>
      <path d="M0,10 Q-8,2 -8,-4 Q-8,-12 0,-16 Q8,-12 8,-4 Q8,2 0,10Z" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glow)"/>
      <circle cx="0" cy="-4" r="2" fill="#ffff00" opacity="0.3">
        <animate attributeName="r" values="2;3;2" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
