<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.4s" repeatCount="indefinite"/>
    <g>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="11" fill="none" stroke="#ffff00" stroke-width="0.8" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ffff00" filter="url(#glow)">$</text>
      <path d="M-10,-10 Q-7,-14 -3,-10" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
