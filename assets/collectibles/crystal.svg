<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="2s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="7s" repeatCount="indefinite"/>
      <path d="M0,-18 L-6,-4 L0,18 L6,-4 Z" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glow)"/>
      <path d="M-6,-4 L0,-8 L6,-4" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
      <path d="M0,-18 L-6,-4 L0,18" fill="#ff00ff" opacity="0.08"/>
      <path d="M0,-18 L6,-4 L0,18" fill="#ff00ff" opacity="0.04"/>
      <line x1="-2" y1="-10" x2="2" y2="-10" stroke="#00ffff" stroke-width="0.8" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0;0.6" dur="0.5s" repeatCount="indefinite"/>
      </line>
      <line x1="-3" y1="-4" x2="3" y2="-4" stroke="#00ffff" stroke-width="0.8" opacity="0.6">
        <animate attributeName="opacity" values="0;0.6;0" dur="0.5s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
</svg>
