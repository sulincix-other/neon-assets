<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <path d="M24,4 L16,14 L24,44 L32,14 Z" fill="#aaddff44" stroke="#88ccff" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M24,4 L16,14 L24,44 L32,14 Z" fill="none" stroke="#bbddff" stroke-width="0.5"/>
  <path d="M24,4 L18,14 L24,44" fill="#aaddff88" stroke="none"/>
  <path d="M24,4 L30,14 L24,44" fill="#aaddff22" stroke="none"/>
  <line x1="24" y1="4" x2="24" y2="44" stroke="#bbddff" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="14" x2="32" y2="14" stroke="#bbddff" stroke-width="0.5" opacity="0.4"/>
  <line x1="19" y1="24" x2="29" y2="24" stroke="#bbddff" stroke-width="0.5" opacity="0.3"/>
  <circle cx="24" cy="24" r="8" fill="#aaddff" opacity="0.15" filter="url(#glow-strong)">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="12" r="1.5" fill="#fff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
