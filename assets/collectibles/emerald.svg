<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <path d="M24,4 L14,16 L24,44 L34,16 Z" fill="#00ff6644" stroke="#00ff66" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M24,4 L14,16 L24,44 L34,16 Z" fill="none" stroke="#44ff88" stroke-width="0.5"/>
  <path d="M24,4 L18,16 L24,44" fill="#00ff6688" stroke="none"/>
  <path d="M24,4 L30,16 L24,44" fill="#00ff6622" stroke="none"/>
  <line x1="24" y1="4" x2="24" y2="44" stroke="#44ff88" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="16" x2="34" y2="16" stroke="#44ff88" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="26" x2="30" y2="26" stroke="#44ff88" stroke-width="0.5" opacity="0.3"/>
  <circle cx="24" cy="24" r="8" fill="#00ff66" opacity="0.15" filter="url(#glow-strong)">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="16" r="1.5" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
