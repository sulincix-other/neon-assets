<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <path d="M24,4 L36,16 L24,44 L12,16 Z" fill="#ff004466" stroke="#ff0044" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M24,4 L36,16 L24,44 L12,16 Z" fill="none" stroke="#ff2266" stroke-width="0.5"/>
  <path d="M24,4 L18,16 L24,44" fill="#ff004488" stroke="none"/>
  <path d="M24,4 L30,16 L24,44" fill="#ff004422" stroke="none"/>
  <line x1="24" y1="4" x2="24" y2="44" stroke="#ff4488" stroke-width="0.5" opacity="0.4"/>
  <line x1="12" y1="16" x2="36" y2="16" stroke="#ff4488" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="26" x2="30" y2="26" stroke="#ff4488" stroke-width="0.5" opacity="0.3"/>
  <circle cx="24" cy="24" r="8" fill="#ff0044" opacity="0.15" filter="url(#glow-strong)">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="16" r="1.5" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
