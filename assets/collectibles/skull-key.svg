<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-25 -30 50 60" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-8;8;-8" dur="3.5s" repeatCount="indefinite"/>
      <path d="M0,14 L-2,2 L-2,-2 Q-2,-10 0,-12 Q2,-10 2,-2 L2,2 Z" fill="none" stroke="#ff6600" stroke-width="1.5" filter="url(#glow)"/>
      <rect x="-2" y="-12" width="4" height="6" rx="1" fill="none" stroke="#ff6600" stroke-width="1" filter="url(#glow)"/>
      <circle cx="0" cy="-8" r="1.5" fill="#ff6600" opacity="0.4"/>
      <path d="M-6,2 L6,2" stroke="#ff6600" stroke-width="1.2" filter="url(#glow)"/>
      <path d="M-4,5 L4,5" stroke="#ff6600" stroke-width="1" opacity="0.6"/>
      <circle cx="0" cy="-16" r="5" fill="none" stroke="#ff6600" stroke-width="1.5" filter="url(#glow)"/>
      <circle cx="0" cy="-16" r="2" fill="#331100" stroke="#ff6600" stroke-width="0.8"/>
      <ellipse cx="-2" cy="-17" rx="1" ry="1.2" fill="#331100" stroke="#ff6600" stroke-width="0.5"/>
      <ellipse cx="2" cy="-17" rx="1" ry="1.2" fill="#331100" stroke="#ff6600" stroke-width="0.5"/>
    </g>
  </g>
</svg>
