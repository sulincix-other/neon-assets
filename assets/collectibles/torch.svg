<svg xmlns="http://www.w3.org/2000/svg" viewBox="-25 -30 50 60" width="200" height="200">
  <defs>
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="1.3s" repeatCount="indefinite"/>
    <rect x="-3" y="4" width="6" height="16" rx="2" fill="none" stroke="#ff6600" stroke-width="1.5" filter="url(#glowOrange)"/>
    <rect x="-2" y="12" width="4" height="6" rx="1" fill="#ff6600" opacity="0.15"/>
    <ellipse cx="0" cy="-2" rx="6" ry="8" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glowOrange)">
      <animate attributeName="rx" values="6;7;6" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="8;9;8" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="-2" rx="3" ry="5" fill="#ff6600" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M-2,-8 Q0,-14 2,-8" fill="none" stroke="#ffff00" stroke-width="1.5" filter="url(#glowYellow)">
      <animate attributeName="d" values="M-2,-8 Q0,-14 2,-8;M-1,-8 Q0,-16 1,-8;M-2,-8 Q0,-14 2,-8" dur="0.15s" repeatCount="indefinite"/>
    </path>
    <path d="M-5,-4 Q-8,-6 -4,-2" fill="none" stroke="#ffff00" stroke-width="1" opacity="0.5"/>
    <path d="M5,-4 Q8,-6 4,-2" fill="none" stroke="#ffff00" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
