<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-40 -40 80 80" width="240" height="240">
  <defs>
    <filter id="glowOrange" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feGaussianBlur stdDeviation="12" result="b3"/><feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <circle cx="0" cy="0" r="20" fill="#ff3300" opacity="0.1" filter="url(#glowOrange)">
      <animate attributeName="r" values="20;30;20" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <path d="M-8,-20 L-4,-8 L-20,-4 L-8,0 L-12,16 L0,6 L12,16 L8,0 L20,-4 L4,-8 L8,-20 L0,-10 Z" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glowOrange)">
      <animate attributeName="stroke" values="#ff6600;#ffff00;#ff3300;#ff6600" dur="0.3s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="6" fill="#ffff00" opacity="0.2" filter="url(#glowYellow)">
      <animate attributeName="r" values="6;10;6" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <line x1="-14" y1="-14" x2="-22" y2="-22" stroke="#ffff00" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="14" y1="-14" x2="22" y2="-22" stroke="#ffff00" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0" dur="0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="-14" y1="14" x2="-22" y2="22" stroke="#ffff00" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="14" y1="14" x2="22" y2="22" stroke="#ffff00" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0;0.6;0" dur="0.2s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
