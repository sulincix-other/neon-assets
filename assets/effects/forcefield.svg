<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-40 -40 80 80" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feGaussianBlur stdDeviation="12" result="b3"/><feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow)">
      <animate attributeName="r" values="28;30;28" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.2">
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="18" fill="#00ffff" opacity="0.04"/>
    <path d="M-20,0 L20,0" stroke="#00ffff" stroke-width="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M0,-20 L0,20" stroke="#00ffff" stroke-width="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="0.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
