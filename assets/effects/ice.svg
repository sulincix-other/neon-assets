<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="6s" repeatCount="indefinite"/>
      <path d="M0,-16 L-6,-8 L-16,-6 L-8,0 L-14,10 L-4,6 L0,16 L4,6 L14,10 L8,0 L16,-6 L6,-8 Z" fill="none" stroke="#00ccff" stroke-width="1.5" filter="url(#glow)">
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.2s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-10 L-4,-4 L-10,-3 L-5,0 L-8,6 L-2,4 L0,10 L2,4 L8,6 L5,0 L10,-3 L4,-4 Z" fill="#00ccff" opacity="0.1"/>
      <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.3">
        <animate attributeName="r" values="3;4;3" dur="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <circle cx="-12" cy="-10" r="1" fill="#00ccff" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="-8" r="0.8" fill="#00ccff" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3;0" dur="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
