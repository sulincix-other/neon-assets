<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -40 60 80" width="240" height="240">
  <defs>
    <filter id="glowCyan" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <path d="M0,20 L-3,10 L-12,12 L-5,4 L-14,-2 L-4,-4 L0,-14 L4,-4 L14,-2 L5,4 L12,12 L3,10 Z" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)">
      <animate attributeName="opacity" values="1;0.5;1" dur="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M0,20 L-3,10 L-12,12 L-5,4 L-14,-2 L-4,-4 L0,-14 L4,-4 L14,-2 L5,4 L12,12 L3,10 Z" fill="#00ffff" opacity="0.08"/>
    <line x1="0" y1="-14" x2="0" y2="-24" stroke="#ffff00" stroke-width="2" filter="url(#glowYellow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.15s" repeatCount="indefinite"/>
    </line>
    <line x1="-8" y1="-10" x2="-14" y2="-18" stroke="#ffff00" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="-10" x2="14" y2="-18" stroke="#ffff00" stroke-width="1" opacity="0.6"/>
    <line x1="-12" y1="12" x2="-18" y2="16" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
    <line x1="12" y1="12" x2="18" y2="16" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
