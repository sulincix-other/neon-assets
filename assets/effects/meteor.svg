<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="24" cy="10" r="4" fill="#ff6600" opacity="0.8" filter="url(#glow-strong)">
    <animate attributeName="cy" values="10;30;10" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;3;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="10" r="2" fill="#ffcc00" opacity="0.9">
    <animate attributeName="cy" values="10;30;10" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <path d="M20,14 Q22,18 20,22" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M28,14 Q26,18 28,22" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
  </path>
  <path d="M32,12 Q30,16 32,20" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <path d="M16,12 Q18,16 16,20" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </path>
