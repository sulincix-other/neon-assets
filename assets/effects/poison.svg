<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="0.8s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#00ff44" stroke-width="2" filter="url(#glow)">
      <animate attributeName="r" values="14;18;14" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="8" fill="#00ff44" opacity="0.08">
      <animate attributeName="r" values="8;12;8" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <path d="M-4,-8 Q0,-14 4,-8" fill="none" stroke="#00ff44" stroke-width="1.5" filter="url(#glow)"/>
    <path d="M-6,-2 Q0,-8 6,-2" fill="none" stroke="#00ff44" stroke-width="1" opacity="0.6"/>
    <path d="M-5,4 Q0,-2 5,4" fill="none" stroke="#00ff44" stroke-width="0.8" opacity="0.4"/>
    <circle cx="0" cy="-6" r="1.5" fill="#00ff44" filter="url(#glow)">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
