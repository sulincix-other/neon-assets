<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="1.2s" repeatCount="indefinite"/>
    <path d="M0,-18 L2,-6 L14,-4 L4,2 L8,14 L0,6 L-8,14 L-4,2 L-14,-4 L-2,-6 Z" fill="none" stroke="#ffff00" stroke-width="1.5" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="0.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M0,-10 L1,-3 L8,-2 L2,1 L4,8 L0,3 L-4,8 L-2,1 L-8,-2 L-1,-3 Z" fill="#ffff00" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="0.6s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="r" values="2;1;2" dur="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
