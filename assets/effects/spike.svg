<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-2;0,0" dur="0.8s" repeatCount="indefinite"/>
    <polygon points="0,-18 -6,0 -12,8 -8,8 -4,0 0,8 4,0 8,8 12,8 6,0" fill="none" stroke="#ff3300" stroke-width="1.5" filter="url(#glow)"/>
    <polygon points="0,-18 -6,0 -12,8 -8,8 -4,0 0,8 4,0 8,8 12,8 6,0" fill="#ff3300" opacity="0.08"/>
    <line x1="0" y1="-18" x2="0" y2="-4" stroke="#ffffff" stroke-width="0.5" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.6s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
