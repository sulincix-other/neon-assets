<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="1.6s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)">
      <animate attributeName="r" values="20;22;20" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="14" fill="#003333" stroke="#00ffff" stroke-width="1.5" filter="url(#glowCyan)">
      <animate attributeName="r" values="14;16;14" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="r" values="6;4;6" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="2.5" fill="#ffffff">
      <animate attributeName="r" values="2.5;1.5;2.5" dur="1s" repeatCount="indefinite"/>
    </circle>
    <path d="M-16,0 A16,16 0 0,1 16,0" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M0,-20 L0,-24" stroke="#00ffff" stroke-width="1" filter="url(#glowCyan)"/>
    <path d="M-14,-14 L-17,-17" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
    <path d="M14,-14 L17,-17" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  </g>
</svg>
