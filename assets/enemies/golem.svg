<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-35 -35 70 70" width="240" height="240">
  <defs>
    <filter id="glowOrange" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-2;0,0" dur="1.8s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="22" rx="20" ry="4" fill="rgba(0,0,0,0.4)"/>
    <rect x="-10" y="8" width="7" height="14" rx="3" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glowOrange)"/>
    <rect x="3" y="8" width="7" height="14" rx="3" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glowOrange)"/>
    <rect x="-14" y="-6" width="28" height="18" rx="5" fill="none" stroke="#ff6600" stroke-width="3" filter="url(#glowOrange)"/>
    <rect x="-10" y="-2" width="20" height="10" rx="3" fill="#ff6600" opacity="0.1"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#ff6600" stroke-width="1" opacity="0.4"/>
    <rect x="-18" y="-4" width="6" height="6" rx="3" fill="none" stroke="#ff6600" stroke-width="1.5" filter="url(#glowOrange)"/>
    <rect x="12" y="-4" width="6" height="6" rx="3" fill="none" stroke="#ff6600" stroke-width="1.5" filter="url(#glowOrange)"/>
    <rect x="-10" y="-20" width="20" height="14" rx="4" fill="none" stroke="#ff6600" stroke-width="2.5" filter="url(#glowOrange)"/>
    <line x1="-10" y1="-16" x2="10" y2="-16" stroke="#ff6600" stroke-width="1" opacity="0.4"/>
    <rect x="-6" y="-18" width="12" height="6" rx="1" fill="#ff6600" opacity="0.12"/>
    <rect x="-4" y="-26" width="8" height="6" rx="1" fill="none" stroke="#ff6600" stroke-width="1.5"/>
    <circle cx="-3" cy="-14" r="2" fill="#ffff00" filter="url(#glowYellow)">
      <animate attributeName="r" values="2;1;2" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="3" cy="-14" r="2" fill="#ffff00" filter="url(#glowYellow)">
      <animate attributeName="r" values="2;1;2" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="-4" y1="-24" x2="4" y2="-24" stroke="#ff6600" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>
