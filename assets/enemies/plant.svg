    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-2;0,0" dur="0.7s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="20" rx="14" ry="4" fill="rgba(0,0,0,0.4)"/>
    <rect x="-7" y="8" width="14" height="14" rx="3" fill="none" stroke="#00ff44" stroke-width="2" filter="url(#glowGreen)"/>
    <path d="M-14,2 Q-18,-14 -8,-20 Q0,-26 8,-20 Q18,-14 14,2" fill="none" stroke="#00ff44" stroke-width="2" filter="url(#glowGreen)">
      <animate attributeName="d" values="M-14,2 Q-18,-14 -8,-20 Q0,-26 8,-20 Q18,-14 14,2;M-14,2 Q-16,-10 -6,-16 Q0,-22 6,-16 Q16,-10 14,2;M-14,2 Q-18,-14 -8,-20 Q0,-26 8,-20 Q18,-14 14,2" dur="0.7s" repeatCount="indefinite"/>
    </path>
