    </circle>
    <circle cx="-15" cy="-5" r="5" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.5"/>
    <circle cx="-15" cy="-5" r="2" fill="#ffff00" opacity="0.3"/>
    <circle cx="22" cy="-12" r="4" fill="none" stroke="#ffff00" stroke-width="1.5" opacity="0.3"/>
