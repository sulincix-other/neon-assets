<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="21" y="4" width="6" height="6" rx="1" fill="#444" stroke="#666" stroke-width="0.5"/>
  <path d="M21,10 L21,12 L27,12 L27,10 Z" fill="#555" stroke="#888" stroke-width="0.5"/>
  <rect x="16" y="12" width="16" height="20" rx="2" fill="#1a1a00" stroke="#ffcc00" stroke-width="1" filter="url(#glow)"/>
  <rect x="16" y="12" width="16" height="2" rx="1" fill="#ffcc00" opacity="0.5"/>
  <rect x="16" y="30" width="16" height="2" rx="1" fill="#ffcc00" opacity="0.5"/>
  <line x1="16" y1="16" x2="32" y2="16" stroke="#ffcc00" stroke-width="0.3" opacity="0.3"/>
  <line x1="16" y1="20" x2="32" y2="20" stroke="#ffcc00" stroke-width="0.3" opacity="0.3"/>
  <line x1="16" y1="24" x2="32" y2="24" stroke="#ffcc00" stroke-width="0.3" opacity="0.3"/>
  <line x1="16" y1="28" x2="32" y2="28" stroke="#ffcc00" stroke-width="0.3" opacity="0.3"/>
  <circle cx="24" cy="22" r="6" fill="#ffcc00" opacity="0.15" filter="url(#glow-strong)">
    <animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="22" r="3" fill="#ffcc00" opacity="0.4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="23" y="32" width="2" height="6" fill="#444" stroke="#666" stroke-width="0.5"/>
  <line x1="21" y1="4" x2="24" y2="2" stroke="#888" stroke-width="0.5"/>
  <line x1="27" y1="4" x2="24" y2="2" stroke="#888" stroke-width="0.5"/>
</svg>
