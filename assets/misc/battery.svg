<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-20 -20 40 40" width="160" height="160">
  <defs>
    <filter id="g" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="2s" repeatCount="indefinite"/>
    <rect x="-7" y="-11" width="14" height="5" rx="1.5" fill="none" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
    <rect x="-2.5" y="-13" width="5" height="3" rx="1" fill="none" stroke="#00ffff" stroke-width="1" filter="url(#g)"/>
    <rect x="-7" y="-4" width="14" height="16" rx="3" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#g)"/>
    <rect x="-7" y="-4" width="14" height="16" rx="3" fill="#00ffff" opacity="0.06"/>
    <rect x="-5" y="-2" width="10" height="3.5" rx="1" fill="#00ffff" opacity="0.35" filter="url(#g)">
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="-5" y="2.5" width="10" height="3.5" rx="1" fill="#00ffff" opacity="0.35" filter="url(#g)">
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="-5" y="7" width="10" height="3.5" rx="1" fill="#ff00ff" filter="url(#g)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
