<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-20 -20 40 40" width="160" height="160">
  <defs>
    <filter id="g" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="2s" repeatCount="indefinite"/>
    <rect x="-8" y="-16" width="16" height="6" rx="2" fill="none" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
    <rect x="-3" y="-18" width="6" height="3" rx="1" fill="none" stroke="#00ffff" stroke-width="1" filter="url(#g)"/>
    <rect x="-8" y="-8" width="16" height="22" rx="3" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#g)"/>
    <rect x="-8" y="-8" width="16" height="22" rx="3" fill="#00ffff" opacity="0.06"/>
    <rect x="-6" y="-5" width="12" height="4" rx="1" fill="#00ffff" opacity="0.3" filter="url(#g)">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="-6" y="1" width="12" height="4" rx="1" fill="#00ffff" opacity="0.3" filter="url(#g)">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="-6" y="7" width="12" height="4" rx="1" fill="#ff00ff" filter="url(#g)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
