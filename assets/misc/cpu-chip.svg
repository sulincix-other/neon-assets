<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-20 -20 40 40" width="160" height="160">
  <defs>
    <filter id="g" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-1;0,0" dur="1.5s" repeatCount="indefinite"/>
    <line x1="-20" y1="-8" x2="-9" y2="-8" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="-20" y1="0" x2="-9" y2="0" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="-20" y1="8" x2="-9" y2="8" stroke="#ff00ff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="9" y1="-8" x2="20" y2="-8" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="9" y1="0" x2="20" y2="0" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="9" y1="8" x2="20" y2="8" stroke="#ff00ff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="-8" y1="-20" x2="-8" y2="-9" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="0" y1="-20" x2="0" y2="-9" stroke="#ff00ff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="8" y1="-20" x2="8" y2="-9" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="-8" y1="9" x2="-8" y2="20" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="0" y1="9" x2="0" y2="20" stroke="#ff00ff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <line x1="8" y1="9" x2="8" y2="20" stroke="#00ffff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <rect x="-9" y="-9" width="18" height="18" rx="2" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#g)"/>
    <rect x="-9" y="-9" width="18" height="18" rx="2" fill="#00ffff" opacity="0.06"/>
    <rect x="-5" y="-5" width="10" height="10" rx="1" fill="none" stroke="#ff00ff" stroke-width="1" filter="url(#g)"/>
    <circle cx="0" cy="0" r="2" fill="#ffff00" filter="url(#g)">
      <animate attributeName="r" values="2;3;2" dur="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
