<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="g" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;3,-2;-3,0;0,2;0,0" dur="3s" repeatCount="indefinite"/>
    <line x1="-18" y1="0" x2="-6" y2="0" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
    <line x1="6" y1="0" x2="18" y2="0" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
    <line x1="0" y1="-12" x2="0" y2="0" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
    <rect x="-7" y="-4" width="14" height="8" rx="3" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#g)"/>
    <rect x="-7" y="-4" width="14" height="8" rx="3" fill="#00ffff" opacity="0.08"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#ff00ff" stroke-width="1" opacity="0.6"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 -18 0" to="360 -18 0" dur="0.15s" repeatCount="indefinite"/>
      <line x1="-22" y1="0" x2="-14" y2="0" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
      <ellipse cx="-18" cy="0" rx="4" ry="1" fill="none" stroke="#00ffff" stroke-width="0.8" opacity="0.3"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 18 0" to="0 18 0" dur="0.15s" repeatCount="indefinite"/>
      <line x1="14" y1="0" x2="22" y2="0" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
      <ellipse cx="18" cy="0" rx="4" ry="1" fill="none" stroke="#00ffff" stroke-width="0.8" opacity="0.3"/>
    </g>
    <circle cx="0" cy="-9" r="1.5" fill="#ff00ff" filter="url(#g)">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
