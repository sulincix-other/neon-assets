<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="g" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;2,-1;-2,1;0,0" dur="4s" repeatCount="indefinite"/>
    <rect x="-4" y="-6" width="8" height="16" rx="2" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#g)"/>
    <rect x="-4" y="-6" width="8" height="16" rx="2" fill="#00ffff" opacity="0.08"/>
    <line x1="4" y1="-2" x2="18" y2="-4" stroke="#00ffff" stroke-width="1" filter="url(#g)"/>
    <line x1="4" y1="2" x2="18" y2="4" stroke="#00ffff" stroke-width="1" filter="url(#g)"/>
    <line x1="-4" y1="-2" x2="-18" y2="-4" stroke="#00ffff" stroke-width="1" filter="url(#g)"/>
    <line x1="-4" y1="2" x2="-18" y2="4" stroke="#00ffff" stroke-width="1" filter="url(#g)"/>
    <rect x="12" y="-10" width="8" height="16" rx="1" fill="none" stroke="#ff00ff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <rect x="12" y="-10" width="8" height="16" rx="1" fill="#ff00ff" opacity="0.06"/>
    <rect x="-20" y="-10" width="8" height="16" rx="1" fill="none" stroke="#ff00ff" stroke-width="1" filter="url(#g)" opacity="0.6"/>
    <rect x="-20" y="-10" width="8" height="16" rx="1" fill="#ff00ff" opacity="0.06"/>
    <line x1="0" y1="10" x2="0" y2="18" stroke="#00ffff" stroke-width="1.5" filter="url(#g)"/>
    <circle cx="0" cy="20" r="2" fill="none" stroke="#00ffff" stroke-width="1" filter="url(#g)"/>
    <circle cx="0" cy="-12" r="1.5" fill="#ffff00" filter="url(#g)">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
