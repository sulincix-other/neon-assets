<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 24 32" width="48" height="64">
  <defs><filter id="g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="5" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <line x1="14" y1="8" x2="6" y2="30" stroke="#8B4513" stroke-width="3" stroke-linecap="round" filter="url(#g)"/>
