<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Game Assets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: monospace; padding: 20px; }
  h1 { text-align: center; color: #00ffff; font-size: 28px; margin-bottom: 4px; text-shadow: 0 0 20px #00ffff88; }
  .counter { text-align: center; color: #666; margin-bottom: 16px; font-size: 12px; }
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .cat-tile { background: #0d0d2a; border: 1px solid #222; border-radius: 8px; padding: 8px 4px; text-align: center; cursor: pointer; transition: 0.25s; }
  .cat-tile:hover { border-color: #ff00ff; box-shadow: 0 0 12px #ff00ff33; }
  .cat-tile.active { border-color: #ff00ff; background: #1a0a2a; box-shadow: 0 0 20px #ff00ff44; }
  .cat-tile svg { width: 36px; height: 36px; display: block; margin: 0 auto 4px; }
  .cat-tile .name { font-size: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .cat-tile.active .name { color: #ff00ff; }
  .cat-tile .count { font-size: 7px; color: #555; }
  .sect { background: #0d0d2a; border: 1px solid #00ffff22; border-radius: 8px; overflow: hidden; display: none; }
  .sect.active { display: block; }
  .sect h2 { color: #ff00ff; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; padding: 10px 14px; border-bottom: 1px solid #ff00ff44; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; padding: 10px; }
  .card { background: #0d0d2a; border: 1px solid #222; border-radius: 6px; padding: 6px; text-align: center; transition: 0.3s; }
  .card:hover { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff44; }
  .card svg, .card object { width: 100%; height: auto; display: block; min-height: 50px; }
  .card .name { font-size: 9px; color: #888; margin-top: 3px; }
  .card .cat { font-size: 7px; color: #555; text-transform: uppercase; }
</style>
</head>
<body>
<h1>⬡ NEON GAME ASSETS</h1>
<p class="counter" id="counter"></p>

<div class="cat-grid" id="catGrid"></div>

<div class="sect" id="assetSect">
  <h2 id="sectTitle"></h2>
  <div class="grid" id="assetGrid"></div>
</div>

<script>
const files = {
  characters:['player-ninja','player-ninja-idle','player-ninja-walk','player-ninja-jump','player-mage','player-mage-idle','player-mage-walk','player-mage-jump','player-knight','player-knight-idle','player-knight-walk','player-knight-jump','player-archer','player-archer-idle','player-archer-walk','player-archer-jump','player-rogue','player-rogue-idle','player-rogue-walk','player-rogue-jump','player-paladin','player-paladin-idle','player-paladin-walk','player-paladin-jump'],
  enemies:['bat','bee','demon','dragon','eye','ghost','goblin','golem','octopus','phoenix','plant','robot','skull','slime','snake','spider','worm','yeti'],
  collectibles:['ankh','bone','book','claw','coin','crystal','diamond','egg','emerald','feather','gem','heart','key','mushroom','pearl','ring','ruby','scroll','skull-key','star','torch'],
  powerups:['amulet','bomb','boots','chest','crown','gem-blue','gem-red','helmet','hourglass','lightning','map','potion','ring','shield','star-small','wings'],
  weapons:['arrow','axe','bow','claw-weapon','crossbow','dagger','fireball','hammer','laser','mace','scythe','shuriken','spear','staff','sword','trident','whip'],
  bullets:['bullet-arrow','bullet-cannon','bullet-fire','bullet-heart','bullet-ice','bullet-lightning','bullet-magic','bullet-orb','bullet-pebble','bullet-poison','bullet-skull','bullet-slow','bullet-star','bullet-void'],
  effects:['bless','bubble','earthquake','electricity-arc','explosion','fire','flag','forcefield','heal','ice','lightning-strike','meteor','poison','portal','pulse','rain','shield-hit','smoke','sparkle','spike','star-burst','tornado'],
  backgrounds:['bg-castle','bg-cave','bg-desert','bg-forest','bg-grid','bg-hell','bg-lava','bg-mountains','bg-neon-city','bg-snow','bg-space','bg-sunset','bg-temple','bg-water'],
  traps:['arrow-trap','bear-trap','boulder','fire-trap','ice-trap','landmine','lightning-trap','pendulum','poison-trap','sawblade','spike-trap','vortex-trap'],
  environment:['barrel','bones','bush','campfire','crate','flowers','lantern','mushrooms','pedestal','rock','signpost','stump','tombstone','tree'],
  tiles:['tile-grass','tile-dirt','tile-stone','tile-sand','tile-snow','tile-ice','tile-lava','tile-water','tile-void','tile-crystal','tile-platform','tile-wall-brick','tile-wall-stone','tile-moss','tile-mud','tile-wood','tile-carpet','tile-marble','tile-slate','tile-cobblestone','tile-sandstone','tile-basalt','tile-web'],
  ui:['badge','button','button-hover','button-large','button-pressed','button-small','checkbox','checkbox-checked','crosshair','dpad','exp-bar','exp-bar-fill','frame','health-bar','health-bar-fill','icon-coin','icon-heart','icon-home','icon-key','icon-pause','icon-play','icon-settings','icon-star','input','joystick','mana-bar','mana-bar-fill','minimap','panel','progress-ring','radio','radio-checked','slider','slider-thumb','toggle','toggle-on','tooltip']
};
const catMeta = {
  characters:'Characters', enemies:'Enemies', collectibles:'Collectibles',
  powerups:'Power-ups', weapons:'Weapons', bullets:'Bullets',
  effects:'Effects', backgrounds:'Backgrounds', traps:'Traps',
  environment:'Environment', tiles:'Tiles', ui:'UI'
};

let total = 0;
const catGrid = document.getElementById('catGrid');
const assetSect = document.getElementById('assetSect');
const assetGrid = document.getElementById('assetGrid');
const sectTitle = document.getElementById('sectTitle');

Object.entries(files).forEach(([cat, list]) => {
  total += list.length;
  const tile = document.createElement('div');
  tile.className = 'cat-tile';
  tile.dataset.cat = cat;
  tile.innerHTML = `<object data="categories/${cat}.svg" type="image/svg+xml">${cat}</object><div class="name">${catMeta[cat]}</div><div class="count">${list.length}</div>`;
  tile.onclick = () => select(cat);
  catGrid.appendChild(tile);

  list.forEach(name => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = cat;
    card.innerHTML = `<object data="${cat}/${name}.svg" type="image/svg+xml" style="width:100%;min-height:50px;">${name}</object><div class="name">${name.replace(/-/g,' ')}</div><div class="cat">${catMeta[cat]}</div>`;
    assetGrid.appendChild(card);
  });
});

document.getElementById('counter').textContent = total + ' total SVG assets — neon glow, transparent, animated';

function select(cat) {
  const tile = document.querySelector(`.cat-tile[data-cat="${cat}"]`);
  const wasActive = tile.classList.contains('active');
  document.querySelectorAll('.cat-tile.active').forEach(t => t.classList.remove('active'));
  assetSect.classList.remove('active');
  if (!wasActive) {
    tile.classList.add('active');
    sectTitle.textContent = '━ ' + catMeta[cat].toUpperCase() + ' ━';
    assetGrid.querySelectorAll('.card').forEach(c => {
      c.style.display = c.dataset.cat === cat ? '' : 'none';
    });
    assetSect.classList.add('active');
  }
}
</script>
</body>
</html>
