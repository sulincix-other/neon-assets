<svg xmlns="http://www.w3.org/2000/svg" viewBox="-25 -30 50 60" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.6s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-8;8;-8" dur="2.5s" repeatCount="indefinite"/>
      <circle cx="0" cy="-4" r="12" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glow)"/>
      <circle cx="0" cy="-4" r="12" fill="#ff6600" opacity="0.06"/>
      <circle cx="0" cy="-4" r="8" fill="none" stroke="#ff6600" stroke-width="0.8" opacity="0.4"/>
      <circle cx="0" cy="-4" r="4" fill="none" stroke="#ff6600" stroke-width="1.5" filter="url(#glow)"/>
      <circle cx="0" cy="-4" r="2" fill="#ffff00" opacity="0.5">
        <animate attributeName="r" values="2;3;2" dur="0.8s" repeatCount="indefinite"/>
      </circle>
      <line x1="0" y1="8" x2="0" y2="18" stroke="#ff6600" stroke-width="1.5" filter="url(#glow)"/>
      <circle cx="0" cy="20" r="2" fill="#ff6600" filter="url(#glow)"/>
    </g>
  </g>
</svg>
