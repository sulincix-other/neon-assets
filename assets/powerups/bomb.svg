<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="1.1s" repeatCount="indefinite"/>
    <circle cx="0" cy="2" r="16" fill="none" stroke="#ff3300" stroke-width="2" filter="url(#glowRed)">
      <animate attributeName="r" values="16;17;16" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="2" r="10" fill="#ff3300" opacity="0.08">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-3" y="-16" width="6" height="5" rx="1.5" fill="none" stroke="#ff3300" stroke-width="1.2"/>
    <line x1="0" y1="-11" x2="0" y2="-6" stroke="#ff3300" stroke-width="1.5" filter="url(#glowRed)"/>
    <circle cx="0" cy="-14" r="2" fill="#ffff00" filter="url(#glowYellow)">
      <animate attributeName="r" values="2;3;2" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <line x1="-6" y1="-3" x2="-10" y2="-3" stroke="#ff3300" stroke-width="0.8" opacity="0.5"/>
    <line x1="6" y1="-3" x2="10" y2="-3" stroke="#ff3300" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="12" x2="0" y2="16" stroke="#ff3300" stroke-width="0.8" opacity="0.5"/>
    <line x1="-6" y1="6" x2="-10" y2="10" stroke="#ff3300" stroke-width="0.8" opacity="0.3"/>
    <line x1="6" y1="6" x2="10" y2="10" stroke="#ff3300" stroke-width="0.8" opacity="0.3"/>
  </g>
</svg>
