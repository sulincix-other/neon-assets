<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-35 -35 70 70" width="240" height="240">
  <defs>
    <filter id="glowYellow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="2s" repeatCount="indefinite"/>
    <rect x="-16" y="-4" width="32" height="20" rx="3" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glowYellow)"/>
    <rect x="-16" y="-4" width="32" height="8" rx="3" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glowYellow)"/>
    <line x1="0" y1="-4" x2="0" y2="16" stroke="#ffff00" stroke-width="1.5" filter="url(#glowYellow)"/>
    <circle cx="0" cy="0" r="2.5" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#glowCyan)">
      <animate attributeName="r" values="2.5;3.5;2.5" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <rect x="-6" y="6" width="5" height="4" rx="1" fill="none" stroke="#ffff00" stroke-width="0.8" opacity="0.5"/>
    <rect x="3" y="6" width="5" height="4" rx="1" fill="none" stroke="#ffff00" stroke-width="0.8" opacity="0.5"/>
    <circle cx="-12" cy="-8" r="1.5" fill="#ffff00" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="-8" r="1.5" fill="#ffff00" opacity="0.4">
      <animate attributeName="opacity" values="0;0.4;0" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
