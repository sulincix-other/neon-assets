<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-25 -30 50 60" width="200" height="200">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="5s" repeatCount="indefinite"/>
      <path d="M0,-16 L12,-4 L0,16 L-12,-4 Z" fill="none" stroke="#ff0044" stroke-width="2" filter="url(#glow)"/>
      <path d="M0,-16 L0,16" stroke="#ff0044" stroke-width="0.8" opacity="0.4"/>
      <path d="M-12,-4 L12,-4" stroke="#ff0044" stroke-width="0.8" opacity="0.4"/>
      <path d="M-5,-4 L0,-12 L5,-4 L0,4 Z" fill="#ff0044" opacity="0.15">
        <animate attributeName="opacity" values="0.15;0.4;0.15" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
