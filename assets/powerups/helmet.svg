<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.7s" repeatCount="indefinite"/>
    <path d="M-16,-4 Q-18,-22 0,-24 Q18,-22 16,-4 Q14,10 0,14 Q-14,10 -16,-4Z" fill="none" stroke="#ff6600" stroke-width="2" filter="url(#glow)"/>
    <line x1="-16" y1="-4" x2="16" y2="-4" stroke="#ff6600" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="-8" y="-10" width="16" height="6" rx="1" fill="#ff6600" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.3;0.12" dur="1s" repeatCount="indefinite"/>
    </rect>
    <circle cx="0" cy="-12" r="3.5" fill="none" stroke="#ffff00" stroke-width="1.2" filter="url(#glow)">
      <animate attributeName="r" values="3.5;4.5;3.5" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-16" x2="0" y2="-8" stroke="#ffff00" stroke-width="0.8" opacity="0.4"/>
    <line x1="-4" y1="-12" x2="4" y2="-12" stroke="#ffff00" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>
