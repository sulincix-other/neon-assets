<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowCyan" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.2s" repeatCount="indefinite"/>
    <path d="M4,-20 L-4,0 L2,0 L-4,16 L8,-4 L3,-4 Z" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)">
      <animate attributeName="stroke" values="#00ffff;#ffffff;#00ffff" dur="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M4,-20 L-4,0 L2,0 L-4,16 L8,-4 L3,-4 Z" fill="#00ffff" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.35;0.12" dur="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M-12,-12 L-8,-8 L-11,-6" fill="none" stroke="#00ffff" stroke-width="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0;0.8;0" dur="0.25s" repeatCount="indefinite"/>
    </path>
    <path d="M12,12 L8,10 L11,7" fill="none" stroke="#00ffff" stroke-width="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="0.25s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
