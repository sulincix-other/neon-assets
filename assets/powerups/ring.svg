<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="1.5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="3s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="18" ry="8" fill="none" stroke="#ff6600" stroke-width="2.5" filter="url(#glow)"/>
      <ellipse cx="0" cy="0" rx="12" ry="5" fill="#ff6600" opacity="0.1"/>
      <ellipse cx="0" cy="0" rx="18" ry="8" fill="none" stroke="#ffff00" stroke-width="0.8" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.6s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="16" cy="0" r="3" fill="#ff6600" filter="url(#glow)"/>
      <circle cx="-16" cy="0" r="3" fill="#ff6600" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="2" fill="#ffff00" filter="url(#glow)">
        <animate attributeName="r" values="2;3;2" dur="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
