<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="4" y="8" width="12" height="32" rx="3" fill="#222" stroke="#666" stroke-width="1"/>
  <rect x="4" y="8" width="4" height="32" rx="1" fill="#444"/>
  <rect x="4" y="12" width="12" height="6" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="4" y="30" width="12" height="6" rx="1" fill="#333" stroke="#555" stroke-width="0.5"/>
  <rect x="8" y="20" width="2" height="3" fill="#ff4400" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="8" y="26" width="2" height="3" fill="#ff4400" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <line x1="16" y1="22" x2="44" y2="22" stroke="#ccc" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="x1" values="16;16;16" dur="3s" repeatCount="indefinite"/>
  </line>
  <polygon points="44,22 38,18 38,26" fill="#ccc" stroke="#aaa" stroke-width="0.5" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <line x1="16" y1="24" x2="44" y2="24" stroke="#ddd" stroke-width="0.8" opacity="0.5"/>
  <rect x="16" y="21" width="22" height="2" fill="#888"/>
  <polygon points="16,18 20,22 16,26" fill="#666" stroke="#888" stroke-width="0.5"/>
</svg>
