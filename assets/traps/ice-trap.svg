<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="6" y="30" width="36" height="8" rx="2" fill="#0a1a2e" stroke="#44aaff" stroke-width="1" filter="url(#glow)"/>
  <rect x="8" y="32" width="32" height="2" fill="#44aaff22"/>
  <rect x="6" y="36" width="36" height="2" rx="1" fill="#0a1a2e" stroke="#44aaff" stroke-width="0.3"/>
  <polygon points="24,4 20,16 28,16" fill="#aaddff44" stroke="#88ccff" stroke-width="1" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="24,4 20,16 28,16" fill="#aaddff22" stroke="none">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <line x1="24" y1="16" x2="24" y2="30" stroke="#88ccff" stroke-width="1" opacity="0.4"/>
  <circle cx="24" cy="20" r="6" fill="#44aaff11" stroke="#88ccff" stroke-width="0.5" opacity="0.5"/>
  <circle cx="24" cy="20" r="3" fill="#44aaff22" stroke="#aaddff" stroke-width="0.5">
    <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="20" r="1.5" fill="#aaddff" opacity="0.7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
  </circle>
  <line x1="14" y1="18" x2="18" y2="20" stroke="#88ccff" stroke-width="0.5" opacity="0.3"/>
  <line x1="34" y1="18" x2="30" y2="20" stroke="#88ccff" stroke-width="0.5" opacity="0.3"/>
</svg>
