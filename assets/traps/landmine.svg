<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <ellipse cx="24" cy="38" rx="12" ry="3" fill="#1a1a2e33" stroke="#444" stroke-width="0.3"/>
  <rect x="10" y="30" width="28" height="6" rx="2" fill="#1a0a0a" stroke="#ff4400" stroke-width="1" filter="url(#glow)"/>
  <rect x="12" y="32" width="24" height="2" fill="#ff440022"/>
  <circle cx="24" cy="26" r="1.5" fill="#ff4400" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="26" r="1" fill="#ff6600" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="26" r="1" fill="#ff6600" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <path d="M24,26 L24,18" stroke="#666" stroke-width="1"/>
  <circle cx="24" cy="16" r="2" fill="#333" stroke="#ff4400" stroke-width="1" filter="url(#glow)"/>
  <circle cx="24" cy="16" r="1" fill="#ff4400" opacity="0.6" filter="url(#glow-strong)">
    <animate attributeName="r" values="1;1.5;1" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <line x1="16" y1="30" x2="14" y2="28" stroke="#ff4400" stroke-width="0.5" opacity="0.4"/>
  <line x1="32" y1="30" x2="34" y2="28" stroke="#ff4400" stroke-width="0.5" opacity="0.4"/>
</svg>
