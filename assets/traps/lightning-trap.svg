<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" filterUnits="userSpaceOnUse" x="-80" y="-80" width="160" height="160"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="6" y="32" width="36" height="8" rx="2" fill="#0a001a" stroke="#aa44ff" stroke-width="1" filter="url(#glow)"/>
  <rect x="8" y="34" width="32" height="2" fill="#aa44ff22"/>
  <rect x="6" y="38" width="36" height="2" rx="1" fill="#0a001a" stroke="#aa44ff" stroke-width="0.3"/>
  <ellipse cx="24" cy="12" rx="3" ry="8" fill="#aa44ff33" stroke="#bb66ff" stroke-width="0.5">
    <animate attributeName="ry" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="16" cy="16" rx="2" ry="5" fill="#aa44ff22" stroke="#bb66ff" stroke-width="0.3">
    <animate attributeName="ry" values="5;7;5" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="32" cy="16" rx="2" ry="5" fill="#aa44ff22" stroke="#bb66ff" stroke-width="0.3">
    <animate attributeName="ry" values="5;7;5" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
  </ellipse>
  <path d="M24,6 L24,10" stroke="#cc88ff" stroke-width="2" filter="url(#glow)">
    <animate attributeName="d" values="M24,6 L24,10;M24,4 L24,8;M24,6 L24,10" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <circle cx="24" cy="8" r="2" fill="#dd99ff" filter="url(#glow-strong)">
    <animate attributeName="r" values="2;3;2" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <path d="M18,12 L20,14" stroke="#cc88ff" stroke-width="1" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.6s" repeatCount="indefinite"/>
  </path>
  <path d="M30,12 L28,14" stroke="#cc88ff" stroke-width="1" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.6s" begin="0.3s" repeatCount="indefinite"/>
  </path>
  <line x1="24" y1="24" x2="24" y2="32" stroke="#aa44ff" stroke-width="1" opacity="0.4"/>
</svg>
