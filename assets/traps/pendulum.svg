<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <line x1="4" y1="6" x2="16" y2="42" stroke="#666" stroke-width="2"/>
  <line x1="44" y1="6" x2="32" y2="42" stroke="#666" stroke-width="2"/>
  <rect x="4" y="4" width="4" height="4" rx="1" fill="#888"/>
  <rect x="40" y="4" width="4" height="4" rx="1" fill="#888"/>
  <line x1="4" y1="6" x2="16" y2="42" stroke="#ff4400" stroke-width="0.5" opacity="0.3"/>
  <line x1="44" y1="6" x2="32" y2="42" stroke="#ff4400" stroke-width="0.5" opacity="0.3"/>
  <line x1="12" y1="12" x2="36" y2="12" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <line x1="14" y1="18" x2="34" y2="18" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="24" x2="32" y2="24" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <line x1="18" y1="30" x2="30" y2="30" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="36" x2="28" y2="36" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <rect x="18" y="10" width="12" height="4" rx="1" fill="#333" stroke="#ff4400" stroke-width="1" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 24 12;30 24 12;-30 24 12;0 24 12" dur="3s" repeatCount="indefinite"/>
  </rect>
  <polygon points="16,10 18,4 18,10" fill="#444" stroke="#ff4400" stroke-width="0.5" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 24 12;30 24 12;-30 24 12;0 24 12" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="32,10 30,4 30,10" fill="#444" stroke="#ff4400" stroke-width="0.5" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 24 12;30 24 12;-30 24 12;0 24 12" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="24" cy="12" r="2" fill="#ff440066" filter="url(#glow-strong)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
