<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="32" width="32" height="6" rx="2" fill="#0a1a0a" stroke="#00ff44" stroke-width="1" filter="url(#glow)"/>
  <rect x="10" y="34" width="28" height="2" rx="1" fill="#00ff4422"/>
  <line x1="16" y1="32" x2="16" y2="28" stroke="#00ff44" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="32" x2="24" y2="28" stroke="#00ff44" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="32" x2="32" y2="28" stroke="#00ff44" stroke-width="1" opacity="0.4"/>
  <ellipse cx="24" cy="16" rx="6" ry="10" fill="#00ff4411" stroke="#00ff44" stroke-width="1" opacity="0.6" filter="url(#glow)">
    <animate attributeName="ry" values="10;14;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="20" cy="14" r="2" fill="#00ff44" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cy" values="14;10;14" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="12" r="1.5" fill="#00ff44" opacity="0.3" filter="url(#glow)">
    <animate attributeName="cy" values="12;8;12" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="8" r="2.5" fill="#00ff44" opacity="0.5" filter="url(#glow)">
    <animate attributeName="cy" values="8;4;8" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <path d="M18,32 Q16,24 20,20" fill="none" stroke="#00ff44" stroke-width="0.5" opacity="0.3"/>
  <path d="M30,32 Q32,24 28,20" fill="none" stroke="#00ff44" stroke-width="0.5" opacity="0.3"/>
