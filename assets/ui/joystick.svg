<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="40" cy="40" r="32" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.4"/>
  <circle cx="40" cy="40" r="26" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.25" stroke-dasharray="4 3"/>
  <circle cx="40" cy="40" r="18" fill="#1a0033" stroke="#ff00ff" stroke-width="2" filter="url(#glow)">
    <animate attributeName="r" values="18;19;18" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="40" r="8" fill="#ff00ff" opacity="0.8" filter="url(#glow-strong)">
    <animate attributeName="r" values="8;9;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <line x1="24" y1="40" x2="56" y2="40" stroke="#ff00ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="40" y1="24" x2="40" y2="56" stroke="#ff00ff" stroke-width="0.5" opacity="0.2"/>
  <polygon points="40,16 44,28 36,28" fill="#ff00ff44" stroke="#ff00ff" stroke-width="1" filter="url(#glow)"/>
  <polygon points="40,64 36,52 44,52" fill="#ff00ff44" stroke="#ff00ff" stroke-width="1" filter="url(#glow)"/>
  <polygon points="16,40 28,44 28,36" fill="#ff00ff44" stroke="#ff00ff" stroke-width="1" filter="url(#glow)"/>
  <polygon points="64,40 52,36 52,44" fill="#ff00ff44" stroke="#ff00ff" stroke-width="1" filter="url(#glow)"/>
  <circle cx="40" cy="40" r="3" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
