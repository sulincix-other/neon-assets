<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-40 -25 80 50" width="240" height="240">
  <defs>
    <filter id="glowCyan" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;8,0;0,0;-8,0;0,0" dur="2s" repeatCount="indefinite"/>
    <line x1="-25" y1="0" x2="20" y2="0" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)"/>
    <polygon points="20,0 10,-6 10,6" fill="none" stroke="#ffff00" stroke-width="1.5" filter="url(#glowYellow)"/>
    <polygon points="20,0 10,-6 10,6" fill="#ffff00" opacity="0.15"/>
    <rect x="-28" y="-2.5" width="6" height="5" rx="1" fill="none" stroke="#ff00ff" stroke-width="1"/>
    <path d="M-28,-2.5 L-22,0 L-28,2.5" fill="none" stroke="#ff00ff" stroke-width="1"/>
  </g>
</svg>
