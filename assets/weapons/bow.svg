<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="1.5s" repeatCount="indefinite"/>
    <path d="M-16,-18 Q-22,0 -16,18" fill="none" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M-16,-18 L-5,0 L-16,18" fill="none" stroke="#ff00ff" stroke-width="1.2" filter="url(#glow)"/>
    <line x1="-5" y1="0" x2="12" y2="0" stroke="#ff00ff" stroke-width="1.2" filter="url(#glow)"/>
    <path d="M12,-2 L16,0 L12,2" fill="none" stroke="#ffff00" stroke-width="1.5" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="0.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
