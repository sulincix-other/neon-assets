<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowCyan" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" filterUnits="userSpaceOnUse" x="-500" y="-500" width="2000" height="2000">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-5;-25;10;-5" dur="2.2s" repeatCount="indefinite"/>
    <rect x="-10" y="-18" width="20" height="14" rx="3" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)"/>
    <rect x="-8" y="-16" width="16" height="10" rx="2" fill="#00ffff" opacity="0.1"/>
    <line x1="-10" y1="-12" x2="10" y2="-12" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
    <rect x="-6" y="-5" width="12" height="3" rx="1" fill="#ff6600" filter="url(#glowOrange)"/>
    <line x1="0" y1="-2" x2="0" y2="16" stroke="#ff6600" stroke-width="2" filter="url(#glowOrange)"/>
    <rect x="-1" y="12" width="3" height="6" rx="1" fill="none" stroke="#ff6600" stroke-width="1"/>
    <circle cx="0" cy="-18" r="1.5" fill="#00ffff" filter="url(#glowCyan)">
      <animate attributeName="r" values="1.5;2.5;1.5" dur="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
