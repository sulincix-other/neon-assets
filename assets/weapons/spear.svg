<svg xmlns="http://www.w3.org/2000/svg" overflow="visible" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="1.3s" repeatCount="indefinite"/>
    <path d="M0,-30 L-4,-18 L-2,-18 L-2,12 L2,12 L2,-18 L4,-18 Z" fill="none" stroke="#00ffff" stroke-width="1.2" filter="url(#glowCyan)"/>
    <polygon points="0,-30 -4,-18 4,-18" fill="none" stroke="#00ffff" stroke-width="1.5" filter="url(#glowCyan)">
      <animate attributeName="opacity" values="1;0.6;1" dur="0.8s" repeatCount="indefinite"/>
    </polygon>
    <line x1="0" y1="-28" x2="0" y2="-20" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <rect x="-2" y="12" width="4" height="8" rx="1" fill="none" stroke="#ff00ff" stroke-width="1.2" filter="url(#glowPink)"/>
    <rect x="-1" y="12" width="2" height="8" fill="#ff00ff" opacity="0.2"/>
  </g>
</svg>
