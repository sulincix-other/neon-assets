    <circle cx="120" cy="40" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="30" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="45" r="0.6" fill="#ffffff"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="60" r="0.6" fill="#ffffff"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="50" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="1.3s" repeatCount="indefinite"/></circle>
