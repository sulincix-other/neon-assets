<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -40 60 80" width="240" height="240">
  <defs>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="1.3s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="26" rx="15" ry="3" fill="rgba(0,0,0,0.4)"/>
    <rect x="-6" y="12" width="5" height="14" rx="2" fill="#00ffff" filter="url(#glowCyan)">
      <animate attributeName="x" values="-6;-4;-6" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="1" y="12" width="5" height="14" rx="2" fill="#00ffff" filter="url(#glowCyan)">
      <animate attributeName="x" values="1;3;1" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="-10" y="-2" width="20" height="16" rx="4" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)"/>
    <rect x="-8" y="0" width="16" height="10" rx="2" fill="#00ffff" opacity="0.12"/>
    <line x1="-10" y1="2" x2="10" y2="2" stroke="#00ffff" stroke-width="0.8" opacity="0.4"/>
    <rect x="-12" y="0" width="4" height="6" rx="2" fill="#00ffff" filter="url(#glowCyan)">
      <animate attributeName="x" values="-12;-10;-12" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="0" width="4" height="6" rx="2" fill="#00ffff" filter="url(#glowCyan)">
      <animate attributeName="x" values="8;6;8" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <path d="M-14,-8 Q-12,-22 0,-24 Q12,-22 14,-8" fill="none" stroke="#00ffff" stroke-width="2.5" filter="url(#glowCyan)"/>
    <line x1="-14" y1="-8" x2="14" y2="-8" stroke="#00ffff" stroke-width="1.5" filter="url(#glowCyan)"/>
    <rect x="-6" y="-16" width="12" height="6" rx="1" fill="#00ffff" opacity="0.15"/>
    <line x1="-4" y1="-13" x2="4" y2="-13" stroke="#ff6600" stroke-width="1.5" filter="url(#glowOrange)">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <rect x="-2" y="-20" width="4" height="4" rx="1" fill="#ffff00" filter="url(#glowYellow)"/>
    <line x1="13" y1="-2" x2="20" y2="-14" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)"/>
    <rect x="12" y="-2" width="3" height="6" rx="1" fill="#ffff00" filter="url(#glowYellow)"/>
  </g>
</svg>
