<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="1.5s" repeatCount="indefinite"/>
    <rect x="-4" y="2" width="8" height="12" rx="3" fill="none" stroke="#ffff00" stroke-width="1.5" filter="url(#glowYellow)"/>
    <ellipse cx="0" cy="-2" rx="14" ry="10" fill="none" stroke="#ff0044" stroke-width="2" filter="url(#glowRed)"/>
    <ellipse cx="0" cy="-2" rx="10" ry="6" fill="#ff0044" opacity="0.12"/>
    <circle cx="-5" cy="-5" r="2.5" fill="none" stroke="#ffff00" stroke-width="1" filter="url(#glowYellow)"/>
    <circle cx="5" cy="-3" r="2" fill="none" stroke="#ffff00" stroke-width="1" filter="url(#glowYellow)"/>
    <circle cx="0" cy="-7" r="1.5" fill="none" stroke="#ffff00" stroke-width="0.8" filter="url(#glowYellow)"/>
    <rect x="-1" y="6" width="2" height="3" rx="0.5" fill="#ffff00" opacity="0.3"/>
  </g>
</svg>
