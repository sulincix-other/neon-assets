<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="1.5s" repeatCount="indefinite"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" repeatCount="indefinite"/>
      <path d="M0,-20 L4,-7 L17,-7 L7,2 L11,16 L0,8 L-11,16 L-7,2 L-17,-7 L-4,-7 Z" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glow)"/>
      <path d="M0,-12 L2.5,-4 L10,-4 L4,1 L6.5,10 L0,5 L-6.5,10 L-4,1 L-10,-4 L-2.5,-4 Z" fill="#ffff00" opacity="0.2">
        <animate attributeName="opacity" values="0.2;0.5;0.2" dur="0.8s" repeatCount="indefinite"/>
      </path>
    </g>
    <circle cx="0" cy="-28" r="1.2" fill="#ffff00" filter="url(#glow)">
      <animate attributeName="cy" values="-28;-33;-28" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="-16" r="0.8" fill="#ffff00" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
