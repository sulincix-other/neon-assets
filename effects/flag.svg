<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="1s" repeatCount="indefinite"/>
    <line x1="-12" y1="16" x2="-12" y2="-18" stroke="#00ff00" stroke-width="2" filter="url(#glow)"/>
    <circle cx="-12" cy="18" r="2" fill="#00ff00" filter="url(#glow)"/>
    <path d="M-10,-18 L10,-14 L-10,-8Z" fill="none" stroke="#00ff00" stroke-width="1.5" filter="url(#glow)">
      <animate attributeName="d" values="M-10,-18 L10,-14 L-10,-8Z;M-10,-18 L10,-16 L-10,-8Z;M-10,-18 L10,-14 L-10,-8Z" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M-10,-18 L10,-14 L-10,-8Z" fill="#00ff00" opacity="0.1"/>
    <circle cx="-2" cy="-14" r="1.5" fill="#00ff00" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
