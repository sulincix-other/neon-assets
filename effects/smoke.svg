<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -30 60 60" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#888888" stroke-width="2" filter="url(#glow)">
      <animate attributeName="r" values="12;16;12" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#888888" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="8;12;8" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#888888" opacity="0.1">
      <animate attributeName="r" values="4;6;4" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M-4,0 L4,0 M0,-4 L0,4" stroke="#aaaaaa" stroke-width="1" opacity="0.5"/>
    <circle cx="10" cy="6" r="1.5" fill="#888888" opacity="0.3">
      <animate attributeName="cx" values="10;12;10" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="6;4;6" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-8" cy="-4" r="1" fill="#888888" opacity="0.2">
      <animate attributeName="cx" values="-8;-10;-8" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
