<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-5;0,0" dur="1.3s" repeatCount="indefinite"/>
    <path d="M-18,-2 L-14,-12 L-8,-6 L0,-14 L8,-6 L14,-12 L18,-2 L18,10 L-18,10 Z" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glowYellow)"/>
    <path d="M-18,-2 L-14,-12 L-8,-6 L0,-14 L8,-6 L14,-12 L18,-2" fill="#ffff00" opacity="0.06"/>
    <line x1="-18" y1="10" x2="18" y2="10" stroke="#ffff00" stroke-width="1.5" filter="url(#glowYellow)"/>
    <circle cx="-14" cy="-12" r="2" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="r" values="2;3;2" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-14" r="2" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="r" values="2;3;2" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="-12" r="2" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="r" values="2;3;2" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-10" cy="2" r="1.5" fill="#ffff00" opacity="0.4"/>
    <circle cx="0" cy="4" r="1.5" fill="#ffff00" opacity="0.4"/>
    <circle cx="10" cy="2" r="1.5" fill="#ffff00" opacity="0.4"/>
  </g>
</svg>
