<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -35 60 70" width="240" height="240">
  <defs>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/><feGaussianBlur stdDeviation="4" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-5;-20;5;-5" dur="1.8s" repeatCount="indefinite"/>
    <path d="M0,-38 L-3,-3 L-1.5,5 L1.5,5 L3,-3 Z" fill="none" stroke="#00ffff" stroke-width="1.5" filter="url(#glowCyan)"/>
    <line x1="0" y1="-32" x2="0" y2="-2" stroke="#ffffff" stroke-width="0.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="0.6s" repeatCount="indefinite"/>
    </line>
    <rect x="-7" y="5" width="14" height="3" rx="1" fill="#ffff00" filter="url(#glowYellow)"/>
    <rect x="-2.5" y="8" width="5" height="8" rx="1.5" fill="none" stroke="#ff00ff" stroke-width="1.2" filter="url(#glowPink)"/>
    <circle cx="0" cy="18" r="2.5" fill="none" stroke="#ff00ff" stroke-width="1.2" filter="url(#glowPink)"/>
    <circle cx="0" cy="18" r="1" fill="#ff00ff" opacity="0.5"/>
  </g>
</svg>
