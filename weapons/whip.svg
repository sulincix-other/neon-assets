<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -25 80 50" width="240" height="240">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b1"/><feGaussianBlur stdDeviation="6" result="b2"/><feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-10;20;-10" dur="1.2s" repeatCount="indefinite"/>
    <path d="M-25,0 Q-15,-15 -5,-5 Q5,5 15,-10 Q25,-20 35,-15" fill="none" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="d" values="M-25,0 Q-15,-15 -5,-5 Q5,5 15,-10 Q25,-20 35,-15;M-25,0 Q-15,-5 -5,-15 Q5,-10 15,0 Q25,-10 35,-5;M-25,0 Q-15,-15 -5,-5 Q5,5 15,-10 Q25,-20 35,-15" dur="0.3s" repeatCount="indefinite"/>
    </path>
    <rect x="-28" y="-2.5" width="6" height="5" rx="1.5" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="35" cy="-15" r="3" fill="#ff00ff" filter="url(#glow)">
      <animate attributeName="r" values="3;4;3" dur="0.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
